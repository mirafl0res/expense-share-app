services:
  db:
    image: postgres:latest
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres-db-data:/var/lib/postgresql

  app:
    build: .
    depends_on:
      - db
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    volumes:
      - .:/app

volumes:
  postgres-db-data:
